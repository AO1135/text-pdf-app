<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Text to PDF</title>
<style>
body { font-family: sans-serif; text-align:center; padding:20px; }
textarea { width: 95%; height:200px; font-size:16px; padding:10px; }
button { padding:12px 20px; font-size:16px; margin-top:10px; }
</style>
</head>
<body>
<h2>文字をPDFに変換</h2>
<form method="POST">
    <textarea name="text" placeholder="文字を入力" required></textarea><br>
    <button type="submit">PDFダウンロード</button>
</form>
</body>
</html>
